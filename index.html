const getLibrarH=eh=>{
  if(!eh||eh.tipo!=='librar')return 0;
  const d=parseFloat(eh.d)||0;
  const n=+(((parseFloat(eh.n)||0)*1.4).toFixed(2));
  const fd=+(((parseFloat(eh.fd)||0)*1.4).toFixed(2));
  const dieta=eh.dieta==='media'?.5:eh.dieta==='completa'?1:0;
  return+(d+n+fd+dieta).toFixed(2);
};
/* CAMBIO 2: juicio a librar → 6h (dentro) o 7h (fuera) a HLIBS */
const getLibrarHJuicio=j=>{
  if(!j?.active||j.horasTipo!=='librar')return 0;
  return j.termMunicipal==='fuera'?7:6;
};

const PieSVG=({data,cardBg})=>{
  const[hov,setHov]=useState(null);
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return<div style={{textAlign:'center',padding:50,color:'#CBD5E1'}}>Sin datos registrados aún.</div>;
  const cx=160,cy=160,R=125,ri=50;let ang=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const frac=d.value/total,start=ang,end=ang+frac*2*Math.PI;ang=end;
    const c1=[Math.cos(start),Math.sin(start)],c2=[Math.cos(end),Math.sin(end)];
    const large=frac>.5?1:0;
    return{...d,frac,mid:start+(end-start)/2,path:[
      `M${cx+ri*c1[0]} ${cy+ri*c1[1]}`,`L${cx+R*c1[0]} ${cy+R*c1[1]}`,
      `A${R} ${R} 0 ${large} 1 ${cx+R*c2[0]} ${cy+R*c2[1]}`,
      `L${cx+ri*c2[0]} ${cy+ri*c2[1]}`,
      `A${ri} ${ri} 0 ${large} 0 ${cx+ri*c1[0]} ${cy+ri*c1[1]}Z`].join(' ')};
  });
  const hd=hov!=null?slices[hov]:null;
  return(
    <svg viewBox="0 0 320 320" style={{width:'100%',maxHeight:300,display:'block'}}>
      {slices.map((s,i)=>(
        <path key={i} d={s.path} fill={s.color} stroke="white" strokeWidth={hov===i?0:1.5}
          style={{cursor:'pointer',filter:hov===i?`drop-shadow(0 0 8px ${s.color})`:'none',transition:'filter .15s'}}
          onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)}
          onTouchStart={()=>setHov(v=>v===i?null:i)}/>
      ))}
      {slices.filter(s=>s.frac>.06).map((s,i)=>{
        const lx=cx+(R+ri)/2*1.1*Math.cos(s.mid),ly=cy+(R+ri)/2*1.1*Math.sin(s.mid);
        return<text key={i} x={lx} y={ly} textAnchor="middle" fontSize="8.5" fontWeight="700" fill="white" style={{pointerEvents:'none'}}>{s.name}</text>;
      })}
      <circle cx={cx} cy={cy} r={ri-2} fill={cardBg||'white'}/>
      {hd?<>
        <text x={cx} y={cy-10} textAnchor="middle" fontSize="12" fontWeight="800" fill="#1E293B">{hd.name}</text>
        <text x={cx} y={cy+6} textAnchor="middle" fontSize="10" fill="#64748B">{hd.total} {hd.unit}</text>
        <text x={cx} y={cy+22} textAnchor="middle" fontSize="10" fontWeight="700" fill={hd.color}>{(hd.frac*100).toFixed(1)}%</text>
      </>:<text x={cx} y={cy+5} textAnchor="middle" fontSize="9" fill="#94A3B8">Toca un sector</text>}
    </svg>
  );
};

  const[agModal,setAgModal]=useState(null);
  const[agAmt,setAgAmt]=useState('');
  const[agTarget,setAgTarget]=useState('t');
  const[addCptModal,setAddCptModal]=useState(false);
  const[newCpt,setNewCpt]=useState({a:'',n:'',t:0,u:'d',c:'#607D8B'});
  const[editCptId,setEditCptId]=useState(null);

  const[importModal,setImportModal]=useState(false);
  const[importText,setImportText]=useState('');
  const[saveInd,setSaveInd]=useState('');
  const[settingsModal,setSettingsModal]=useState(false);
  const[widgetModal,setWidgetModal]=useState(null);
  const[newPat,setNewPat]=useState('work');
  const[form,setForm]=useState({...EF,eh:{...EF.eh},juicio:{...EF.juicio},slots:[],nota:''});
  const[draggingIdx,setDraggingIdx]=useState(null);
  const[dragOverIdx,setDragOverIdx]=useState(null);
  const dragState=useRef({active:false,idx:null,timer:null});
  /* CAMBIO 6: EH plegable */
  const[showEh,setShowEh]=useState(false);
  /* CAMBIO 1: slot add UI */
  const[showSlotAdd,setShowSlotAdd]=useState(false);
  const[slotForm,setSlotForm]=useState({type:'',hrs:1});

  /* theme */
  const dm=settings.darkMode||false;
  const TH=dm?{
    dm:true,pageBg:'#0F172A',cardBg:'#1E293B',cardBg2:'#162032',
    text:'#E2E8F0',textSub:'#94A3B8',border:'#334155',
    inputBg:'#0F172A',inputBorder:'#475569',navBg:'#1E293B',navBorder:'#334155',
    sectionTitle:'#93C5FD',progBg:'#334155',
    tagBlueBg:'#1E3A5F',tagBlueText:'#93C5FD',tagGreenBg:'#14532D',tagGreenText:'#86EFAC',
    tagOrangeBg:'#431407',tagOrangeText:'#FED7AA',
    calEmpty:'#1E293B',calToday:'#1E3A5F',calTodayBorder:'#3B82F6',
  }:{
    dm:false,pageBg:'#F1F5F9',cardBg:'white',cardBg2:'#FAFAFA',
    text:'#1E293B',textSub:'#64748B',border:'#E5E7EB',
    inputBg:'white',inputBorder:'#E0E0E0',navBg:'white',navBorder:'#E2E8F0',
    sectionTitle:'#1E3A8A',progBg:'#E8EAED',
    tagBlueBg:'#DBEAFE',tagBlueText:'#1D4ED8',tagGreenBg:'#E8F5E9',tagGreenText:'#2E7D32',
    tagOrangeBg:'#FFE0B2',tagOrangeText:'#E65100',
    calEmpty:'#FAFAFA',calToday:'#DBEAFE',calTodayBorder:'#1D4ED8',
  };

  const prof=profiles[Math.min(activeProf,profiles.length-1)]||profiles[0];
  const{cpts,ents,mrDays,mwDays,pat}=prof;
  const upd=fn=>setProfiles(ps=>ps.map((p,i)=>i===activeProf?{...p,...fn(p)}:p));
  const setCpts=fn=>upd(p=>({cpts:typeof fn==='function'?fn(p.cpts):fn}));
  const setEnts=fn=>upd(p=>({ents:typeof fn==='function'?fn(p.ents):fn}));
  const setMrDays=fn=>upd(p=>({mrDays:typeof fn==='function'?fn(p.mrDays):fn}));
  const setMwDays=fn=>upd(p=>({mwDays:typeof fn==='function'?fn(p.mwDays):fn}));
  const setPat=fn=>upd(p=>({pat:typeof fn==='function'?fn(p.pat):fn}));

  /* localStorage */
  useEffect(()=>{
    try{
      const raw=localStorage.getItem('cal_v5');
      if(raw){
        const d=JSON.parse(raw);
        if(d.profiles)setProfiles(d.profiles);
        if(d.activeProf!=null)setActiveProf(d.activeProf);
        if(d.settings){
          /* merge: añadir widgets nuevos que no existieran */
          const savedW=d.settings.widgets||[];
          const mergedW=INIT_SET.widgets.map(dw=>savedW.find(w=>w.id===dw.id)||dw);
          setSettings({...INIT_SET,...d.settings,widgets:mergedW});
        }
      } else {
        const raw4=localStorage.getItem('cal_v4');
        if(raw4){
          const d=JSON.parse(raw4);
          if(d.profiles)setProfiles(d.profiles);
          if(d.activeProf!=null)setActiveProf(d.activeProf);

              }} style={{background:'#1D4ED8',border:'none',borderRadius:14,padding:'7px 14px',fontSize:11,color:'white',cursor:'pointer',fontWeight:700}}>OK</button>
            </div>
            {settings.customLogoData&&settings.logoType==='custom'&&(
              <button onClick={()=>setSettings(s=>({...s,customLogoData:null,logoType:'pm'}))}
                style={{marginTop:8,background:'none',border:`1px solid ${TH.border}`,borderRadius:12,padding:'4px 10px',fontSize:10,color:'#B91C1C',cursor:'pointer',fontWeight:600}}>
                🗑 Quitar imagen personalizada</button>
            )}
          </div>
        </Card>
        <Card th={TH}>
          <STitle th={TH} icon="👤">Perfiles (máx. 4)</STitle>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {Array.from({length:4},(_,i)=>{const p=profiles[i];return(
              <div key={i} style={{border:activeProf===i&&p?'2px solid #1D4ED8':`2px solid ${TH.border}`,borderRadius:14,padding:12,
                background:activeProf===i&&p?(dm?'#1E3A5F':'#EFF6FF'):TH.cardBg2,cursor:p?'pointer':'default'}}>
                {p?(<>
                  <div onClick={()=>{setActiveProf(i);setSettingsModal(false);}}
                    style={{fontSize:12,fontWeight:800,color:activeProf===i?'#1D4ED8':TH.text,marginBottom:2}}>{p.name}</div>
                  <div style={{fontSize:9,color:TH.textSub}}>{Object.keys(p.ents).length} días · {p.cpts.length} conceptos</div>
                  {activeProf===i&&<div style={{fontSize:8,color:'#1D4ED8',fontWeight:700,marginTop:2}}>● ACTIVO</div>}
                  <div style={{display:'flex',gap:4,marginTop:6}}>
                    <button onClick={()=>{const name=window.prompt('Nombre:',p.name);if(name)setProfiles(ps=>ps.map((pp,ii)=>ii===i?{...pp,name}:pp));}}
                      style={{fontSize:9,background:TH.tagBlueBg,color:TH.tagBlueText,border:'none',borderRadius:8,padding:'2px 8px',cursor:'pointer',fontWeight:700}}>✏️</button>
                    {profiles.length>1&&activeProf!==i&&(
                      <button onClick={()=>{if(window.confirm(`¿Eliminar "${p.name}"?`)){setProfiles(ps=>ps.filter((_,ii)=>ii!==i));setActiveProf(0);}}}
                        style={{fontSize:9,background:dm?'#3B0000':'#FEF2F2',color:'#B91C1C',border:'none',borderRadius:8,padding:'2px 8px',cursor:'pointer',fontWeight:700}}>🗑</button>
                    )}
                  </div>
                </>):(
                  <button onClick={()=>{const name=window.prompt('Nombre:',`Perfil ${i+1}`);if(name){setProfiles(ps=>{const n=[...ps];n[i]=INIT_PROF(name);return n;});}}}
                    style={{width:'100%',height:72,background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,color:TH.textSub}}>
                    <span style={{fontSize:24}}>+</span><span style={{fontSize:10,fontWeight:600}}>Nuevo perfil</span>
                  </button>
                )}
              </div>
            );})}
          </div>
        </Card>
        {/* CAMBIO 5: widgets con toggle de notas */}
        <Card th={TH}>
          <STitle th={TH} icon="📦">Widgets y visualización</STitle>
          {settings.widgets.map((w,i)=>(
            <div key={w.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:i<settings.widgets.length-1?`1px solid ${TH.border}`:'none'}}>
              <button onClick={()=>setSettings(s=>({...s,widgets:s.widgets.map((ww,ii)=>ii===i?{...ww,show:!ww.show}:ww)}))}
                style={{background:w.show?'#1D4ED8':TH.progBg,border:'none',borderRadius:20,width:36,height:20,cursor:'pointer',position:'relative',flexShrink:0}}>
                <div style={{position:'absolute',top:2,left:w.show?18:2,width:16,height:16,borderRadius:'50%',background:'white',transition:'left .2s'}}/>
              </button>
              <input value={w.name} onChange={e=>setSettings(s=>({...s,widgets:s.widgets.map((ww,ii)=>ii===i?{...ww,name:e.target.value}:ww)}))}
                style={{flex:1,border:`1px solid ${TH.border}`,borderRadius:12,padding:'6px 10px',fontSize:12,fontFamily:'inherit',background:TH.inputBg,color:TH.text}}/>
            </div>
          ))}
          <div style={{fontSize:10,color:TH.textSub,marginTop:8,lineHeight:1.5}}>
            📝 "Notas del día" controla si se muestran las notas en vista semana y día
          </div>
        </Card>
      </div>
    </div>
  )}

  {/* WIDGET MODALS */}
  {widgetModal==='overtime'&&(
    <ModalShell th={TH} title={`⏰ ${settings.widgets.find(w=>w.id==='overtime')?.name||'HORAS EXTRAS 💶'}`} onClose={()=>setWidgetModal(null)}>
      <div style={{marginBottom:12,background:dm?'#1A1000':'#FFFBEB',borderRadius:14,padding:12,textAlign:'center'}}>
        <div style={{fontSize:28,fontWeight:800,color:'#F59E0B'}}>{overtimeCobrar.toFixed(1)}h</div>
        <div style={{fontSize:11,color:TH.textSub}}>Horas a cobrar en {td.getFullYear()}</div>
      </div>
      {overtimeRows.filter(r=>r.tipo!=='librar').length===0
        ?<p style={{textAlign:'center',color:TH.textSub,fontSize:13}}>Sin horas a cobrar registradas.</p>
        :overtimeRows.filter(r=>r.tipo!=='librar').map((r,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:`1px solid ${TH.border}`}}>
            <div>
              <span style={{fontWeight:700,color:TH.text,fontSize:12}}>{r.dk}</span>
              <span style={{color:TH.textSub,marginLeft:8,fontSize:11}}>{r.d>0&&`☀️${r.d}h `}{r.n>0&&`🌙${r.n}h `}{r.fd>0&&`🎉${r.fd}h `}</span>
              {r.motivo&&<div style={{fontSize:10,color:TH.textSub}}>📝 {r.motivo}</div>}
            </div>
            <span style={{fontWeight:800,color:'#F59E0B',fontSize:12}}>{r.total.toFixed(1)}h</span>
          </div>
        ))
      }
    </ModalShell>
  )}
  {widgetModal==='trials_done'&&(
    <ModalShell th={TH} title={`⚖️ ${settings.widgets.find(w=>w.id==='trials_done')?.name||'Juicios realizados'}`} onClose={()=>setWidgetModal(null)}>
      <div style={{marginBottom:12,background:dm?'#1A0F2E':'#F3E8FF',borderRadius:14,padding:12,textAlign:'center'}}>
        <div style={{fontSize:28,fontWeight:800,color:'#8B5CF6'}}>{trialsDone.length}</div>
        <div style={{fontSize:11,color:TH.textSub}}>Juicios realizados en {td.getFullYear()}</div>
      </div>
      {trialsDone.length===0?<p style={{textAlign:'center',color:TH.textSub,fontSize:13}}>Sin juicios registrados.</p>
        :trialsDone.map((t,i)=>(
          <div key={i} style={{padding:'10px 0',borderBottom:`1px solid ${TH.border}`}}>
            <div style={{fontWeight:800,color:TH.text,fontSize:13}}>{t.dk}</div>
            <div style={{fontSize:11,color:TH.textSub,marginTop:3}}>
              {t.juzgado&&<span>⚖️ {t.juzgado} · </span>}
              {t.horaInicio&&<span>🕐 {t.horaInicio}{t.horaFin&&`–${t.horaFin}`}</span>}
              {t.termMunicipal&&<span> · {t.termMunicipal==='dentro'?'📍 Dentro':'📍 Fuera'}</span>}
            </div>
          </div>
        ))
      }
    </ModalShell>
  )}
  {widgetModal==='trials_future'&&(
    <ModalShell th={TH} title={`📅 ${settings.widgets.find(w=>w.id==='trials_future')?.name||'Juicios futuros'}`} onClose={()=>setWidgetModal(null)}>
      <div style={{marginBottom:12,background:dm?'#1A0F2E':'#F3E8FF',borderRadius:14,padding:12,textAlign:'center'}}>
        <div style={{fontSize:28,fontWeight:800,color:'#8B5CF6'}}>{trialsFuture.length}</div>
        <div style={{fontSize:11,color:TH.textSub}}>Próximos juicios</div>
      </div>
      {trialsFuture.length===0?<p style={{textAlign:'center',color:TH.textSub,fontSize:13}}>No hay juicios futuros.</p>
        :trialsFuture.map((t,i)=>(
          <div key={i} style={{padding:'10px 12px',borderRadius:12,marginBottom:8,
            background:i===0?(dm?'#1A0F2E':'#F3E8FF'):(dm?TH.cardBg2:'#FAFAFA'),
            border:i===0?'2px solid #8B5CF6':`1px solid ${TH.border}`}}>
            <div style={{fontWeight:800,color:i===0?'#8B5CF6':TH.text,fontSize:13,display:'flex',alignItems:'center',gap:6}}>
              {i===0&&<span style={{fontSize:9,background:'#8B5CF6',color:'white',borderRadius:8,padding:'1px 6px',fontWeight:700}}>PRÓXIMO</span>}
              {t.dk}
            </div>
            <div style={{fontSize:11,color:TH.textSub,marginTop:4}}>
              {t.juzgado&&<div>⚖️ {t.juzgado}</div>}
              {t.horaInicio&&<div>🕐 {t.horaInicio}{t.horaFin&&` – ${t.horaFin}`}</div>}
              {t.termMunicipal&&<div>{t.termMunicipal==='dentro'?'📍 Dentro':'📍 Fuera'} del término</div>}
            </div>
          </div>
        ))
      }
    </ModalShell>
  )}

  {/* IMPORT */}
  {importModal&&(
    <ModalShell th={TH} title="⬆ Importar datos" onClose={()=>setImportModal(false)}>
      <div style={{background:dm?'#1A1400':'#FEF9C3',borderRadius:12,padding:'10px 14px',fontSize:12,color:'#92400E',marginBottom:12}}>
        Pega el JSON exportado. Se sobreescribirán todos los datos.
      </div>
      <textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder='Pega el JSON aquí…' rows={7}
        style={{width:'100%',borderRadius:12,border:`1.5px solid ${TH.border}`,padding:'10px 12px',fontSize:10,fontFamily:'monospace',
          boxSizing:'border-box',background:TH.cardBg2,resize:'none',color:TH.text}}/>
      <div style={{display:'flex',gap:8,marginTop:12}}>
        <Btn full outline onClick={()=>setImportModal(false)}>Cancelar</Btn>
        <Btn full disabled={!importText.trim()} color='#16A34A' onClick={doImport}>✅ Importar</Btn>
      </div>
    </ModalShell>
  )}

  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('./sw.js').catch(e=>console.log('SW',e));
    });
  }
</script>
</body>
</html>
